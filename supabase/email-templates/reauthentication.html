<!-- Supabase → Authentication → Emails → "Reauthentication"
     Onderwerp: Je SteraPro-bevestigingscode
     LET OP: deze template gebruikt een code ({{ .Token }}), geen link. -->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#FFFDF7;margin:0;padding:0;">
  <tr>
    <td align="center" style="padding:32px 16px;font-family:Helvetica,Arial,sans-serif;">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#FFFFFF;border:1px solid rgba(0,0,0,0.08);border-radius:16px;overflow:hidden;">
        <tr>
          <td style="padding:28px 32px;background:#FFFDF7;border-bottom:1px solid rgba(0,0,0,0.06);">
            <img src="https://sterapro.vercel.app/stera-logo.png" alt="SteraPro" height="38" style="display:block;border:0;">
          </td>
        </tr>
        <tr>
          <td style="padding:36px 32px 8px 32px;">
            <h1 style="margin:0 0 12px 0;color:#2F5840;font-size:24px;font-weight:700;">Bevestig je identiteit</h1>
            <p style="margin:0 0 20px 0;color:#3F3F3F;font-size:15px;line-height:1.6;">
              Gebruik deze code om je actie te bevestigen:
            </p>
            <div style="display:inline-block;background:#F1EFE8;color:#2F5840;font-size:30px;font-weight:700;letter-spacing:6px;padding:14px 26px;border-radius:12px;">{{ .Token }}</div>
            <p style="margin:24px 0 0 0;color:#9a9a9a;font-size:12px;">Heb je dit niet aangevraagd? Negeer deze e-mail.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:22px 32px;background:#F1EFE8;color:#7a7a7a;font-size:12px;line-height:1.6;">
            SteraPro &middot;Sierbeplanting &amp; onderhoud voor bedrijven<br>
            Deze e-mail werd automatisch verzonden — niet beantwoorden.
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
